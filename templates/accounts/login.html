{% extends 'base.html' %}

{% block title %}Login - NEXTSTEP{% endblock %}

{% block content %}
<div class="container" style="max-width: 400px; margin-top: 48px;">
    <div class="card">
        <h2 class="card-title" style="text-align: center;">Login</h2>
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" class="form-control" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
        </form>
        <p style="text-align: center; margin-top: 16px;">
            Don't have an account? <a href="{% url 'signup' %}" style="color: var(--primary);">Sign Up</a>
        </p>
    </div>
</div>
{% endblock %}
