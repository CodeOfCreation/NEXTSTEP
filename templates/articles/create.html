{% extends 'base.html' %}

{% block title %}Write Article - NEXTSTEP{% endblock %}

{% block content %}
<div class="container" style="max-width: 600px; margin-top: 32px;">
    <div class="card">
        <h2 class="card-title">Write an Article</h2>
        <form method="post" action="{% url 'create_article' %}">
            {% csrf_token %}
            <div class="form-group">
                <label for="title">Title</label>
                <input type="text" id="title" name="title" class="form-control" required>
            </div>
            <div class="form-group">
                <label for="content">Content</label>
                <textarea id="content" name="content" class="form-control" rows="12" required></textarea>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Publish Article</button>
        </form>
    </div>
</div>

{% endblock %}
